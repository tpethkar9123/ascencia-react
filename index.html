    <script>
      // 1. Manual Toggle for Popup 153
      document.addEventListener('click', function(e) {
        const toggle = e.target.closest('[href*="eyJpZCI6IjE1MyIsInRvZ2dsZSI6ZmFsc2V9"]');
        if (toggle) {
          e.preventDefault();
          const modal = document.getElementById('elementor-popup-modal-153');
          if (modal) {
            modal.classList.toggle('show');
            modal.style.display = modal.classList.contains('show') ? 'flex' : 'none';
          }
        }
        
        // Close button
        const closeBtn = e.target.closest('.dialog-close-button');
        if (closeBtn && e.target.closest('#elementor-popup-modal-153')) {
           e.preventDefault();
           const modal = document.getElementById('elementor-popup-modal-153');
           modal.classList.remove('show');
           modal.style.display = 'none';
        }
      });

      // 2. Vegas Slider Shim
      function initVegas() {
        if (window.jQuery && window.jQuery.vegas) {
           window.removeEventListener('scroll', initVegas);
           window.removeEventListener('load', initVegas);
           console.log('Vegas detected, initializing sliders...');
           
           // A. Standard Elementor Gallery
           jQuery('[data-settings*="background_gallery"]').each(function() {
              try {
                const settings = JSON.parse(jQuery(this).attr('data-settings'));
                if (settings.background_gallery) {
                   const slides = settings.background_gallery.map(img => ({ src: img.url.replace(/https?:\/\/www.ascencia-business-school.mt/g, '') }));
                   jQuery(this).vegas({ slides: slides, timer: false, shuffle: true });
                }
              } catch(e){}
           });

           // B. Anywhere Elementor Pro (data-aepro-bg-slider)
           jQuery('[data-aepro-bg-slider]').each(function() {
              try {
                const attr = jQuery(this).attr('data-aepro-bg-slider');
                const settings = JSON.parse(attr);
                if (settings && settings.slides) {
                   jQuery(this).vegas({ 
                     slides: settings.slides, 
                     timer: settings.timer === 'yes', 
                     delay: parseInt(settings.delay) || 5000,
                     transition: settings.transition || 'fade',
                     overlay: settings.overlay === 'yes'
                   });
                }
              } catch(e){}
           });
        }
      }
      window.addEventListener('scroll', initVegas, { passive: true });
      window.addEventListener('load', initVegas);
      setTimeout(initVegas, 2000); // Robust fallback
    </script>
